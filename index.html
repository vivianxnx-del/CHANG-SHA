<head>

<title>長沙 4 日 3 夜｜智能行程</title>
<style>

  body {

  .alert-banner {

  }

  .day-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; padding: 8px 12px; background: white;
    border: 2px solid #f0d9c8; border-radius: 16px;

  .day-tab.active {

  .day-header {

  .timeline { position: relative; padding-left: 22px; }
  .timeline::before {
    content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px;
    width: 2px;
    background: linear-gradient(to bottom, #c0392b, #e67e22, #f0d9c8);
  }
  .event {
    position: relative; background: white; border-radius: 11px;
    padding: 11px 13px; margin-bottom: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .event::before {
    content: ''; position: absolute; left: -19px; top: 14px;
    width: 10px; height: 10px; background: white;
    border: 3px solid #c0392b; border-radius: 50%;
    box-shadow: 0 0 0 3px #fdf6f0;
  }
  .event-time { font-size: 11px; color: #c0392b; font-weight: 700; margin-bottom: 2px; }
  .event-title { font-size: 13px; font-weight: 600; color: #2c1810; margin-bottom: 2px; }
  .event-desc { font-size: 12px; color: #6b5b4d; }

  .event-tag {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 4px; margin-right: 4px; vertical-align: 1px;
    font-weight: 600;
  }
  .tag-attraction { background: #e8f5e9; color: #2d8a5f; }
  .tag-food { background: #ffe5d9; color: #c0392b; }
  .tag-hotel { background: #e3f2fd; color: #1a4d8f; }
  .tag-other { background: #f0f0f0; color: #666; }

  .event-links {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px;
  }
  .event-links a {

  }
  .event-links .map-btn {

  .transit {

  .l1 { background: #c0392b; }

  .transit-baidu {
    display: inline-flex; align-items: center; gap: 3px;

    background: linear-gradient(135deg, #4285f4, #1a73e8);
    color: white; font-size: 11px; font-weight: 600;
    text-decoration: none;
  }

  .info-box {
    background: white; border-radius: 12px; padding: 14px;
    margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .info-box h3 { font-size: 14px; color: #c0392b; margin-bottom: 8px; }
  .info-box p { font-size: 12px; color: #6b5b4d; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🌶️ 長沙 4 日 3 夜</h1>
      <div class="subtitle">智能行程 · 自動生成導航與小紅書連結</div>
    </div>
    <div class="header-btns">
      <button class="h-btn" id="editBtn" onclick="toggleEdit()">✏️ 編輯</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="alert-banner">
    💡 <strong>小紅書連結</strong>：每個景點/餐廳已自動加入小紅書搜尋連結，行程更改後自動同步更新。
  </div>
  <div class="alert-banner info">
    🗺️ <strong>百度地圖導航</strong>：起點自動帶入上一個行程地點，地鐵路線會列明轉乘車站。改動行程後自動重算。
  </div>

  <div class="day-tabs" id="dayTabs"></div>
  <div id="itinerary"></div>
</div>

<script>
/* ============ 行程資料 ============ */
const itinerary = [
  {
    day: 1, date: "Day 1",
    title: "抵達長沙｜老長沙夜遊",
    desc: "黃花機場 → 入住酒店 → 太平街尋味",
    events: [
      { time: "14:00", type: "other", title: "抵達長沙黃花國際機場", desc: "搭乘磁浮列車或地鐵 6 號線進市區", noLinks: true },
      { time: "15:30", type: "hotel", title: "華美達廣場酒店（五一廣場店）", desc: "市中心位置，鄰近地鐵 1/2 號線五一廣場站，逛街方便。" },
      { time: "17:00", type: "attraction", title: "黃興路步行街", desc: "長沙最熱鬧的商業街，霓虹招牌＋網紅店打卡聖地。" },
      { time: "18:30", type: "food", title: "文和友（海信廣場店）", desc: "復刻 80 年代老長沙街景，必試小龍蝦、臭豆腐。" },
      { time: "20:30", type: "attraction", title: "太平街", desc: "古樸石板街，茶顏悅色總店所在地，夜景超美。" },
      { time: "21:30", type: "food", title: "茶顏悅色（太平街店）", desc: "招牌幽蘭拿鐵、聲聲烏龍，必飲！" }
    ]
  },
  {
    day: 2, date: "Day 2",
    title: "嶽麓山＋橘子洲",
    desc: "登山賞楓 → 古書院 → 江心島",
    events: [
      { time: "08:00", type: "food", title: "肆姐粉店（坡子街店）", desc: "本地人推薦早餐，招牌肉絲粉、辣椒炒肉蓋碼。" },
      { time: "09:30", type: "attraction", title: "嶽麓書院", desc: "千年學府，朱熹、張栻講學之地，門票 ¥50。" },
      { time: "12:00", type: "food", title: "新華樓（嶽麓店）", desc: "湖南老字號，鹼水麵、刀削麵、包子皆出名。" },
      { time: "13:30", type: "attraction", title: "嶽麓山", desc: "可乘索道上山，愛晚亭、麓山寺必到，秋季紅葉絕景。" },
      { time: "16:30", type: "attraction", title: "橘子洲頭", desc: "毛主席青年雕像所在地，湘江中央島嶼，黃昏景色一流。" },
      { time: "19:00", type: "food", title: "盛記一品（解放西路店）", desc: "本地連鎖湘菜館，剁椒魚頭、毛氏紅燒肉必點。" },
      { time: "21:00", type: "attraction", title: "解放西路酒吧街", desc: "長沙夜生活地標，年輕人扎堆，氣氛熱鬧。" }
    ]
  },
  {
    day: 3, date: "Day 3",
    title: "歷史文化＋商業購物",
    desc: "湖南博物院 → 長沙 IFS → 坡子街",
    events: [
      { time: "08:30", type: "food", title: "楊裕興（五一廣場店）", desc: "百年老店，雞蛋面、酸辣面、滷味拼盤。" },
      { time: "10:00", type: "attraction", title: "湖南博物院", desc: "馬王堆漢墓出土文物（辛追夫人）必看，需預約免費門票。" },
      { time: "13:00", type: "food", title: "費大廚辣椒炒肉（IFS 店）", desc: "湘菜頂流，辣椒炒肉是招牌中的招牌。" },
      { time: "15:00", type: "attraction", title: "長沙 IFS 國金中心", desc: "頂樓 KAWS 雕塑打卡點，內有奢華品牌、書店、米其林。" },
      { time: "18:00", type: "food", title: "笨蘿蔔湘菜館（坡子街店）", desc: "性價比超高的湘菜館，臘味合蒸、口味蝦推薦。" },
      { time: "20:00", type: "attraction", title: "坡子街", desc: "長沙小吃集中地，火宮殿就在這裡，夜市氣氛濃。" },
      { time: "21:30", type: "food", title: "火宮殿（坡子街總店）", desc: "百年老店，臭豆腐、糖油粑粑、姊妹糰子必試。" }
    ]
  },
  {
    day: 4, date: "Day 4",
    title: "悠閒早午餐｜返程",
    desc: "酒店 Check-out → 機場",
    events: [
      { time: "09:00", type: "food", title: "墨茉點心局（IFS 店）", desc: "網紅中式點心，麻薯、芝士牛肉酥必買手信。" },
      { time: "10:30", type: "attraction", title: "杜甫江閣", desc: "湘江畔仿古樓閣，緬懷詩聖杜甫，江景開揚。" },
      { time: "12:00", type: "food", title: "炊煙時代小炒黃牛肉（五一廣場店）", desc: "招牌小炒黃牛肉，嫩滑帶鑊氣，臨走前最後一頓湘菜。" },
      { time: "14:00", type: "other", title: "酒店 Check-out 取行李", desc: "整理行李，準備出發機場。", noLinks: true },
      { time: "15:00", type: "other", title: "前往黃花機場", desc: "建議搭地鐵 6 號線或磁浮，1 小時前到達。", noLinks: true }
    ]
  }
];

/* ============ 連結自動生成 ============ */
// 小紅書搜尋
function xhsLink(name) {
  return "https://www.xiaohongshu.com/search_result?keyword=" + encodeURIComponent("長沙 " + name) + "&type=51";
}
// 百度地圖：單點搜尋
function baiduSearch(name) {
  return "https://map.baidu.com/search/" + encodeURIComponent(name) + "/@12521000,3253000,12z?querytype=s&wd=" + encodeURIComponent("長沙 " + name);
}
// 百度地圖：路線導航（公交/地鐵優先）
function baiduDir(from, to) {
  return "https://map.baidu.com/dir/" +
    encodeURIComponent(from) + "/" + encodeURIComponent(to) +
    "/@12521000,3253000,12z?querytype=bt&c=長沙&sn=2$$$$$$" + encodeURIComponent(from) + "$$0$$$$&en=2$$$$$$" + encodeURIComponent(to) + "$$0$$$$&sc=158&ec=158&pn=0&rn=5";
}

/* ============ 模擬地鐵轉乘資料 ============ */
// 簡化版：根據關鍵地點配對地鐵建議；實際以百度地圖即時計算為準
const subwayHints = {
  "華美達廣場酒店（五一廣場店）|文和友（海信廣場店）": { walk: "步行 5 分鐘", text: "步行可達" },
  "文和友（海信廣場店）|太平街": { walk: "步行 8 分鐘", text: "步行可達，沿黃興南路向南" },
  "太平街|茶顏悅色（太平街店）": { walk: "街內步行", text: "同一條街內" },
  "華美達廣場酒店（五一廣場店）|嶽麓書院": {
    text: "五一廣場站 <span class='line l1'>2號線</span> 西行 → 溁灣鎮站 <span class='transfer-icon'>⇄ 轉</span> <span class='line l4'>4號線</span> 南行 → 湖南大學站，步行 10 分鐘"
  },
  "嶽麓書院|嶽麓山": { walk: "步行 5 分鐘", text: "書院後門即可登山" },
  "嶽麓山|橘子洲頭": {
    text: "嶽麓山南站 <span class='line l4'>4號線</span> 北行 → 溁灣鎮站 <span class='transfer-icon'>⇄ 轉</span> <span class='line l2'>2號線</span> 東行 → 橘子洲站"
  },
  "橘子洲頭|盛記一品（解放西路店）": {
    text: "橘子洲站 <span class='line l2'>2號線</span> 東行 → 五一廣場站，步行 5 分鐘"
  },
  "湖南博物院|費大廚辣椒炒肉（IFS 店）": {
    text: "省政府站 <span class='line l3'>3號線</span> 南行 → 五一廣場站 <span class='transfer-icon'>⇄ 轉</span> <span class='line l1'>1號線</span>，步行可達 IFS"
  },
  "費大廚辣椒炒肉（IFS 店）|長沙 IFS 國金中心": { walk: "同一商場", text: "費大廚位於 IFS 內" },
  "長沙 IFS 國金中心|笨蘿蔔湘菜館（坡子街店）": { walk: "步行 8 分鐘", text: "沿黃興路向南即達坡子街" },
  "墨茉點心局（IFS 店）|杜甫江閣": {
    text: "五一廣場站 <span class='line l1'>1號線</span> → 步行 8 分鐘至湘江畔"
  },
  "杜甫江閣|炊煙時代小炒黃牛肉（五一廣場店）": { walk: "步行 12 分鐘", text: "沿解放西路向東" }
};

function getTransitHint(from, to) {
  const key = from + "|" + to;
  if (subwayHints[key]) return subwayHints[key];
  // 預設：相近區域用打車/步行
  return { text: "建議打車或叫滴滴，約 10–20 分鐘車程；亦可使用百度地圖查實時公交。" };
}

/* ============ 渲染 ============ */
let currentDay = 0;

function tagInfo(type) {
  const map = {
    attraction: { cls: "tag-attraction", text: "景點" },
    food: { cls: "tag-food", text: "餐廳" },
    hotel: { cls: "tag-hotel", text: "住宿" },
    other: { cls: "tag-other", text: "交通" }
  };
  return map[type] || map.other;
}

function render() {
  // Tabs
  const tabs = document.getElementById("dayTabs");
  tabs.innerHTML = itinerary.map((d, i) =>
    `<div class="day-tab ${i === currentDay ? 'active' : ''}" onclick="switchDay(${i})">${d.date}<br><span style="font-size:9px;opacity:0.85">${d.title.split('｜')[0]}</span></div>`
  ).join('');

  // Itinerary
  const day = itinerary[currentDay];
  const cont = document.getElementById("itinerary");

  let html = `
    <div class="day-header">
      <h2><span class="editable" data-path="day.${currentDay}.title">${day.title}</span></h2>
      <p><span class="editable" data-path="day.${currentDay}.desc">${day.desc}</span></p>
    </div>
    <div class="timeline">
  `;

  day.events.forEach((ev, i) => {
    const tag = tagInfo(ev.type);
    const showLinks = ev.type === "attraction" || ev.type === "food" || ev.type === "hotel";

    // 上一個有實體地點的行程作為導航起點
    let prevPlace = null;
    for (let k = i - 1; k >= 0; k--) {
      const p = day.events[k];
      if (p.type === "attraction" || p.type === "food" || p.type === "hotel") {
        prevPlace = p.title; break;
      }
    }
    // 如果今日第一個地點，找前一日最後一個地點
    if (!prevPlace && i > 0 && currentDay > 0) {
      const prevDay = itinerary[currentDay - 1];
      for (let k = prevDay.events.length - 1; k >= 0; k--) {
        const p = prevDay.events[k];
        if (p.type === "attraction" || p.type === "food" || p.type === "hotel") {
          prevPlace = p.title; break;
        }
      }
    }

    // 交通卡（顯示在行程之前，除了第一個）
    if (prevPlace && showLinks) {
      const hint = getTransitHint(prevPlace, ev.title);
      html += `
        <div class="transit">
          <div class="transit-route">
            🚇 <span class="from">${prevPlace}</span><span class="arrow">→</span><span class="to">${ev.title}</span>
          </div>
          <div class="transit-detail">${hint.walk ? '🚶 ' + hint.walk + '：' : ''}${hint.text}</div>
          <a class="transit-baidu" href="${baiduDir(prevPlace, ev.title)}" target="_blank">
            🗺️ 百度地圖導航
          </a>
        </div>
      `;
    }

    html += `
      <div class="event" data-day="${currentDay}" data-idx="${i}">
        <button class="delete-btn edit-only" onclick="deleteEvent(${currentDay}, ${i})">×</button>
        <div class="event-time"><span class="editable" data-path="ev.${currentDay}.${i}.time">${ev.time}</span></div>
        <div class="event-title">
          <span class="event-tag ${tag.cls}">${tag.text}</span>
          <span class="editable" data-path="ev.${currentDay}.${i}.title">${ev.title}</span>
        </div>
        <div class="event-desc"><span class="editable" data-path="ev.${currentDay}.${i}.desc">${ev.desc}</span></div>
        ${showLinks ? `
          <div class="event-links">
            <a class="map-btn" href="${baiduSearch(ev.title)}" target="_blank">📍 百度地圖</a>
            <a class="xhs-btn" href="${xhsLink(ev.title)}" target="_blank">📕 小紅書介紹</a>
          </div>
        ` : ''}
      </div>
    `;
  });

  html += `
    </div>
    <button class="add-event-btn edit-only" onclick="addEvent(${currentDay})">＋ 新增行程</button>
  `;

  cont.innerHTML = html;
  bindEditables();
}

function switchDay(i) {
  currentDay = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============ 編輯模式 ============ */
function toggleEdit() {
  document.body.classList.toggle("edit-mode");
  document.getElementById("editBtn").classList.toggle("active");
  const txt = document.body.classList.contains("edit-mode") ? "✅ 完成" : "✏️ 編輯";
  document.getElementById("editBtn").textContent = txt;
}

function bindEditables() {
  document.querySelectorAll(".editable").forEach(el => {
    el.addEventListener("blur", function() {
      const path = this.dataset.path.split('.');
      const newVal = this.textContent.trim();
      if (path[0] === "day") {
        itinerary[+path[1]][path[2] === "title" ? "title" : "desc"] = newVal;
      } else if (path[0] === "ev") {
        const field = path[3];
        itinerary[+path[1]].events[+path[2]][field] = newVal;
      }
      // 重新渲染以同步連結
      render();
      // 動畫提示
      setTimeout(() => {
        document.querySelectorAll(".event-links a, .transit-baidu").forEach(a => {
          a.classList.add("auto-updated");
          setTimeout(() => a.classList.remove("auto-updated"), 1100);
        });
      }, 50);
    });
    el.addEventListener("keydown", function(e) {
      if (e.key === "Enter") { e.preventDefault(); this.blur(); }
    });
  });
}

function deleteEvent(dIdx, eIdx) {
  itinerary[dIdx].events.splice(eIdx, 1);
  render();
}

function addEvent(dIdx) {
  itinerary[dIdx].events.push({
    time: "12:00",
    type: "attraction",
    title: "新景點",
    desc: "點擊編輯描述"
  });
  render();
}

render();
</script>
