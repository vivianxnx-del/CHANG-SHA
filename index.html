/* ============ 渲染 ============ */
let currentDay = 0;

function tagInfo(type) {
  const map = {
    attraction: { cls: "tag-attraction", text: "景點" },
    food: { cls: "tag-food", text: "餐廳" },
    hotel: { cls: "tag-hotel", text: "住宿" },
    booked: { cls: "tag-booked", text: "已預訂" },
    station: { cls: "tag-station", text: "車站" },
    other: { cls: "tag-other", text: "其他" }
  };
  return map[type] || map.other;
}

function renderCompareTable(route) {
  let rows = '';
  const rec = route.recommend;

  if (route.walk) {
    const isRec = rec === "walk";
    rows += `
      <tr>
        <td class="mode-cell mode-walk"><span class="icon">🚶</span>步行</td>
        <td><span class="pill cheap">免費</span><span class="pill fast">${route.walk.time}</span>${isRec ? '<span class="pill best">⭐ 推薦</span>' : ''}</td>
        <td>${route.walk.detail}</td>
      </tr>
    `;
  }
  if (route.subway) {
    const isRec = rec === "subway";
    rows += `
      <tr>
        <td class="mode-cell mode-subway"><span class="icon">🚇</span>地鐵</td>
        <td><span class="pill cheap">${route.subway.fare}</span><span class="pill">${route.subway.time}</span>${route.subway.transfers ? `<span class="pill">${route.subway.transfers}</span>` : ''}${isRec ? '<span class="pill best">⭐ 推薦</span>' : ''}</td>
        <td>${route.subway.detail}</td>
      </tr>
    `;
  }
  if (route.taxi) {
    const isRec = rec === "taxi";
    rows += `
      <tr>
        <td class="mode-cell mode-taxi"><span class="icon">🚖</span>打車</td>
        <td><span class="pill">${route.taxi.fare}</span><span class="pill fast">${route.taxi.time}</span>${isRec ? '<span class="pill best">⭐ 推薦</span>' : ''}</td>
        <td>${route.taxi.detail}</td>
      </tr>
    `;
  }

  return `
    <table class="compare-table">
      <thead>
        <tr>
          <th class="col-mode">方式</th>
          <th>時間 / 費用</th>
          <th>說明</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    ${route.reason ? `<div class="transit-detail" style="background:#fff8e1;color:#92400e;font-size:11px;padding:6px 8px;border-radius:6px;margin-bottom:6px;">💡 推薦原因：${route.reason}</div>` : ''}
  `;
}

function getRoute(from, to) {
  return routes[from + "|" + to] || {
    taxi: { time: "約 15–25 分鐘", fare: "￥20–35", detail: "建議使用滴滴打車。" },
    recommend: "taxi"
  };
}

function render() {
  const tabs = document.getElementById("dayTabs");
  tabs.innerHTML = itinerary.map((d, i) =>
    `<div class="day-tab ${i === currentDay ? 'active' : ''}" onclick="switchDay(${i})">${d.date}<br><span style="font-size:9px;opacity:0.85">${d.title.split('｜')[0]}</span></div>`
  ).join('');

  const day = itinerary[currentDay];
  const cont = document.getElementById("itinerary");

  let html = `
    <div class="day-header">
      <h2><span class="editable" data-path="day.${currentDay}.title">${day.title}</span></h2>
      <p><span class="editable" data-path="day.${currentDay}.desc">${day.desc}</span></p>
    </div>
    <div class="timeline">
  `;

  day.events.forEach((ev, i) => {
    const tag = tagInfo(ev.type);
    const showLinks = ev.type === "attraction" || ev.type === "food" || ev.type === "hotel" || ev.type === "booked" || ev.type === "station";

    // 上一個地點（包括車站）
    let prevPlace = null;
    for (let k = i - 1; k >= 0; k--) {
      const p = day.events[k];
      if (showableType(p.type)) { prevPlace = p.title; break; }
    }
    if (!prevPlace && currentDay > 0) {
      const prevDay = itinerary[currentDay - 1];
      for (let k = prevDay.events.length - 1; k >= 0; k--) {
        const p = prevDay.events[k];
        if (showableType(p.type)) { prevPlace = p.title; break; }
      }
    }

    if (prevPlace && showableType(ev.type)) {
      const route = getRoute(prevPlace, ev.title);
      html += `
        <div class="transit">
          <div class="transit-route">
            🛣️ <span class="from">${prevPlace}</span><span class="arrow">→</span><span class="to">${ev.title}</span>
          </div>
          ${renderCompareTable(route)}
          <div class="transit-actions">
            <a class="transit-baidu" href="${baiduDir(prevPlace, ev.title)}" target="_blank">🗺️ 百度地圖導航</a>
            <a class="transit-didi" href="${didiLink()}" target="_blank">🚖 滴滴打車</a>
          </div>
        </div>
      `;
    }

    const bookedClass = ev.type === "booked" ? " booked-item" : "";

    html += `
      <div class="event${bookedClass}" data-day="${currentDay}" data-idx="${i}">
        <button class="delete-btn edit-only" onclick="deleteEvent(${currentDay}, ${i})">×</button>
        <div class="event-time"><span class="editable" data-path="ev.${currentDay}.${i}.time">${ev.time}</span></div>
        <div class="event-title">
          <span class="event-tag ${tag.cls}">${tag.text}</span>
          <span class="editable" data-path="ev.${currentDay}.${i}.title">${ev.title}</span>
        </div>
        <div class="event-desc"><span class="editable" data-path="ev.${currentDay}.${i}.desc">${ev.desc}</span></div>
        ${showLinks ? `
          <div class="event-links">
            <a class="map-btn" href="${baiduSearch(ev.title)}" target="_blank">📍 百度地圖</a>
            <a class="xhs-btn" href="${xhsLink(ev.title)}" target="_blank">📕 小紅書介紹</a>
          </div>
        ` : ''}
      </div>
    `;
  });

  html += `
    </div>
    <button class="add-event-btn edit-only" onclick="addEvent(${currentDay})">＋ 新增行程</button>
  `;

  cont.innerHTML = html;
  bindEditables();
}

function showableType(t) {
  return t === "attraction" || t === "food" || t === "hotel" || t === "booked" || t === "station";
}

function switchDay(i) {
  currentDay = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleEdit() {
  document.body.classList.toggle("edit-mode");
  document.getElementById("editBtn").classList.toggle("active");
  const txt = document.body.classList.contains("edit-mode") ? "✅ 完成" : "✏️ 編輯";
  document.getElementById("editBtn").textContent = txt;
}

function bindEditables() {
  document.querySelectorAll(".editable").forEach(el => {
    el.addEventListener("blur", function() {
      const path = this.dataset.path.split('.');
      const newVal = this.textContent.trim();
      if (path[0] === "day") {
        itinerary[+path[1]][path[2] === "title" ? "title" : "desc"] = newVal;
      } else if (path[0] === "ev") {
        const field = path[3];
        itinerary[+path[1]].events[+path[2]][field] = newVal;
      }
      render();
      setTimeout(() => {
        document.querySelectorAll(".event-links a, .transit-baidu, .transit-didi").forEach(a => {
          a.classList.add("auto-updated");
          setTimeout(() => a.classList.remove("auto-updated"), 1100);
        });
      }, 50);
    });
    el.addEventListener("keydown", function(e) {
      if (e.key === "Enter") { e.preventDefault(); this.blur(); }
    });
  });
}

function deleteEvent(dIdx, eIdx) {
  itinerary[dIdx].events.splice(eIdx, 1);
  render();
}

function addEvent(dIdx) {
  itinerary[dIdx].events.push({
    time: "12:00",
    type: "attraction",
    title: "新景點",
    desc: "點擊編輯描述"
  });
  render();
}

render();
</script>
